<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم اللغة الإيزيدية | Ezidi Learning</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="welcome-body">
    <div class="welcome-container">
        <div class="logo-area">
            <!-- شعار بسيط يشبه بومة دولينجو ولكن كرمز للتعليم -->
            <div class="app-logo">🦚</div> 
            <h1>Zimanê Êzidî</h1>
            <p class="subtitle">قم ببعض الدقائق يومياً لتعلم اللغة الإيزيدية مجاناً!</p>
        </div>

        <div class="lang-selector-box">
            <h2>اختر لغتك الأم للبدء</h2>
            <p class="en-text">Choose your native language to start</p>
            <p class="de-text">Wählen Sie Ihre Muttersprache, um zu beginnen</p>
            
            <button class="btn-lang" onclick="selectLanguage('ar')">
                <span class="flag">🇸🇾</span> العربية (Arabic)
            </button>
            <button class="btn-lang" onclick="selectLanguage('en')">
                <span class="flag">🇬🇧</span> English (الإنجليزية)
            </button>
            <button class="btn-lang" onclick="selectLanguage('de')">
                <span class="flag">🇩🇪</span> Deutsch (الألمانية)
            </button>
        </div>
    </div>

    <script>
        function selectLanguage(lang) {
            localStorage.setItem('ezidi_user_lang', lang);
            window.location.href = 'app.html';
        }
    </script>
</body>
</html>
